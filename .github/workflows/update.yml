name: Update Progress

on:
  push:
    branches: [ "main" ]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      - name: Validate Stats
        run: |
          node scripts/stats.js
          echo "Stats validated successfully"